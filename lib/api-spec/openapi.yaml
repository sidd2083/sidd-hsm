openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Campus Exchange API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User operations
  - name: markets
    description: Market operations
  - name: bets
    description: Betting operations
  - name: leaderboard
    description: Leaderboard operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    post:
      operationId: createProfile
      tags: [users]
      summary: Create user profile (onboarding)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/daily-claim:
    post:
      operationId: claimDailyBonus
      tags: [users]
      summary: Claim daily Rs. 100 bonus
      responses:
        "200":
          description: Bonus claimed or already claimed today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyClaimResult"

  /markets:
    get:
      operationId: listMarkets
      tags: [markets]
      summary: List all markets
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of markets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Market"

  /markets/{id}:
    get:
      operationId: getMarket
      tags: [markets]
      summary: Get a single market
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Market
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"
        "404":
          description: Not found

  /markets/{id}/bets:
    get:
      operationId: getMarketBets
      tags: [bets]
      summary: Get all bets for a market
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of bets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bet"

  /bets:
    post:
      operationId: placeBet
      tags: [bets]
      summary: Place a bet on a market
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BetInput"
      responses:
        "201":
          description: Bet placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"
        "400":
          description: Market locked or insufficient funds
        "409":
          description: Market is locked

  /bets/my:
    get:
      operationId: listMyBets
      tags: [bets]
      summary: Get current user's bets
      responses:
        "200":
          description: List of user bets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bet"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get leaderboard rankings
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, weekly, all-time]
        - name: sort
          in: query
          schema:
            type: string
            enum: [richest, profit, loss]
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /admin/markets:
    post:
      operationId: adminCreateMarket
      tags: [admin]
      summary: Admin — create a new market
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketInput"
      responses:
        "201":
          description: Market created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"

  /admin/markets/{id}/resolve:
    post:
      operationId: adminResolveMarket
      tags: [admin]
      summary: Admin — resolve market and pay out winners
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketResolution"
      responses:
        "200":
          description: Market resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"

  /admin/users/{uid}/wallet:
    patch:
      operationId: adminAdjustWallet
      tags: [admin]
      summary: Admin — manually adjust a user's wallet
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletAdjustment"
      responses:
        "200":
          description: Wallet adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin — list all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      required: [uid, email, displayName, academicStream, section, walletBalance, lastDailyClaimDate]
      properties:
        uid:
          type: string
        email:
          type: string
        displayName:
          type: string
        academicStream:
          type: string
        section:
          type: string
        walletBalance:
          type: number
        lastDailyClaimDate:
          type: ["string", "null"]

    UserProfileInput:
      type: object
      required: [displayName, academicStream, section]
      properties:
        displayName:
          type: string
        academicStream:
          type: string
          enum:
            - "Class 11 - Science"
            - "Class 11 - Management"
            - "Class 12 - Science"
            - "Class 12 - Management"
            - "Bachelor"
        section:
          type: string

    DailyClaimResult:
      type: object
      required: [claimed, walletBalance]
      properties:
        claimed:
          type: boolean
        walletBalance:
          type: number

    Market:
      type: object
      required: [id, question, category, lockTimestamp, status, yesPool, noPool]
      properties:
        id:
          type: string
        question:
          type: string
        category:
          type: string
          enum: [sports, college, social, national]
        lockTimestamp:
          type: number
        status:
          type: string
          enum: [active, locked, resolved]
        yesPool:
          type: number
        noPool:
          type: number
        winningOutcome:
          type: ["string", "null"]
        createdAt:
          type: number

    MarketInput:
      type: object
      required: [question, category, lockTimestamp]
      properties:
        question:
          type: string
        category:
          type: string
          enum: [sports, college, social, national]
        lockTimestamp:
          type: number

    MarketResolution:
      type: object
      required: [outcome]
      properties:
        outcome:
          type: string
          enum: ["YES", "NO"]

    Bet:
      type: object
      required: [id, userId, marketId, type, amountPaid, poolShareAtBet, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        marketId:
          type: string
        type:
          type: string
          enum: ["YES", "NO"]
        amountPaid:
          type: number
        poolShareAtBet:
          type: number
        createdAt:
          type: number
        marketQuestion:
          type: ["string", "null"]
        marketStatus:
          type: ["string", "null"]
        winningOutcome:
          type: ["string", "null"]

    BetInput:
      type: object
      required: [marketId, type, amountPaid]
      properties:
        marketId:
          type: string
        type:
          type: string
          enum: ["YES", "NO"]
        amountPaid:
          type: number

    LeaderboardEntry:
      type: object
      required: [uid, displayName, academicStream, section, walletBalance, netWorth, totalProfit, totalLoss]
      properties:
        uid:
          type: string
        displayName:
          type: string
        academicStream:
          type: string
        section:
          type: string
        walletBalance:
          type: number
        netWorth:
          type: number
        totalProfit:
          type: number
        totalLoss:
          type: number
        rank:
          type: number

    WalletAdjustment:
      type: object
      required: [amount, reason]
      properties:
        amount:
          type: number
        reason:
          type: string
