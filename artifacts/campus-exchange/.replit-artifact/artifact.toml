kind = "web"
previewPath = "/"
title = "Predic HSM — Campus Prediction Markets"
version = "1.0.0"
id = "artifacts/campus-exchange"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24919

[services.development]
run = "pnpm --filter @workspace/campus-exchange run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campus-exchange", "run", "build" ]
serve = "static"
publicDir = "artifacts/campus-exchange/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24919"
BASE_PATH = "/"
